name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ASTRO_BASE: ${{ vars.ASTRO_BASE }}
      ASTRO_SITE: ${{ vars.ASTRO_SITE }}
      PUBLIC_AI_ENABLED: ${{ vars.PUBLIC_AI_ENABLED }}
      PUBLIC_AI_MENU_SUGGESTIONS_ENABLED: ${{ vars.PUBLIC_AI_MENU_SUGGESTIONS_ENABLED }}
      PUBLIC_AI_REMOTE_CONFIG_ENABLED: ${{ vars.PUBLIC_AI_REMOTE_CONFIG_ENABLED }}
      PUBLIC_FIREBASE_API_KEY: ${{ vars.PUBLIC_FIREBASE_API_KEY }}
      PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.PUBLIC_FIREBASE_AUTH_DOMAIN }}
      PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.PUBLIC_FIREBASE_PROJECT_ID }}
      PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.PUBLIC_FIREBASE_STORAGE_BUCKET }}
      PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      PUBLIC_FIREBASE_APP_ID: ${{ vars.PUBLIC_FIREBASE_APP_ID }}
      PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.PUBLIC_FIREBASE_MEASUREMENT_ID }}
      PUBLIC_AI_ENABLED: ${{ vars.PUBLIC_AI_ENABLED }}
      PUBLIC_AI_MENU_SUGGESTIONS_ENABLED: ${{ vars.PUBLIC_AI_MENU_SUGGESTIONS_ENABLED }}
      PUBLIC_AI_SHOPPING_LIST_ENABLED: ${{ vars.PUBLIC_AI_SHOPPING_LIST_ENABLED }}
      PUBLIC_AI_REMOTE_CONFIG_ENABLED: ${{ vars.PUBLIC_AI_REMOTE_CONFIG_ENABLED }}
  
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
